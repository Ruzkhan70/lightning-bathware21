<!doctype html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NZ7JV53WQK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-NZ7JV53WQK');
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning Bathware - Sri Lanka's Premier Hardware Store</title>
  <meta name="description" content="Lightning Bathware is Sri Lanka's leading hardware store, offering premium lighting, bathroom fittings, plumbing, and electrical hardware. Explore our wide range of products and special offers." />
  <meta name="google-site-verification" content="SmhkE1y_ZF07BhXK5G-KYOGKaxA-orPqOQvs09x8jT8" />
  <!-- Loading styles to prevent flash -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      min-height: 100vh;
    }
    #root {
      min-height: 100vh;
    }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #f9f9f9;
      color: #333;
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 9999;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #e5e5e5;
      border-top-color: #D4AF37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 20px;
      color: #D4AF37;
      font-size: 14px;
      letter-spacing: 2px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Loading screen shown immediately - outside React -->
  <div class="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING...</div>
  </div>
  
  <div id="root"></div>
  
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove loading screen after React mounts
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loading = document.querySelector('.loading-screen');
        if (loading) loading.remove();
      }, 100);
    });
  </script>
</body>

</html>
